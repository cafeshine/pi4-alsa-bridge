name: Build alsa_bridge.ko + kernel Image (single source)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu bc flex bison libelf-dev kmod

      - name: Download RPi kernel source
        run: |
          git clone --depth=1 -b rpi-6.6.y \
            https://github.com/raspberrypi/linux.git /tmp/linux

      - name: Build kernel + alsa_bridge (same source)
        working-directory: /tmp/linux
        run: |
          # Configure
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- bcm2711_defconfig

          # Record kernel version BEFORE full build
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare
          KVER=$(grep UTS_RELEASE include/generated/utsrelease.h | awk -F'"' '{print $2}')
          echo "KERNEL_VERSION=$KVER" >> $GITHUB_ENV

          # Full kernel Image compile
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- Image.gz modules

      - name: Build alsa_bridge.ko
        run: |
          make -C /tmp/linux \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            M=${{ github.workspace }}/DirettaAlsaHost \
            KBUILD_MODPOST_WARN=1 modules

      - name: Install modules + Package
        run: |
          mkdir -p output

          # 1. kernel Image
          cp /tmp/linux/arch/arm64/boot/Image.gz output/kernel8.img

          # 2. Install ALL kernel modules (snd, snd-pcm, etc.)
          make -C /tmp/linux \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            modules_install INSTALL_MOD_PATH=${{ github.workspace }}/output

          # 3. alsa_bridge.ko → standalone copy + into modules tree (for depmod)
          cp DirettaAlsaHost/alsa_bridge.ko output/
          mkdir -p output/lib/modules/${{ env.KERNEL_VERSION }}/kernel/drivers/alsa_bridge
          cp DirettaAlsaHost/alsa_bridge.ko output/lib/modules/${{ env.KERNEL_VERSION }}/kernel/drivers/alsa_bridge/

          # 4. Regenerate module dependency index (so modprobe alsa_bridge auto-loads snd+snd-pcm)
          depmod -b output -F /tmp/linux/System.map ${{ env.KERNEL_VERSION }}

          echo "Source version: ${{ env.KERNEL_VERSION }}" > output/version.txt
          ls -lh output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pi4-bundle
          path: output/
