name: Build alsa_bridge.ko for Pi 4B

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu \
            bc flex bison libelf-dev

      - name: Download RPi kernel source
        run: |
          git clone --depth=1 -b rpi-6.6.y \
            https://github.com/raspberrypi/linux.git /tmp/linux

      - name: Configure kernel (bcm2711_defconfig)
        working-directory: /tmp/linux
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- bcm2711_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare
          echo "Kernel: $(grep UTS_RELEASE include/generated/utsrelease.h)"

      - name: Build alsa_bridge.ko
        run: |
          make -C /tmp/linux \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            M=${{ github.workspace }}/DirettaAlsaHost \
            KBUILD_MODPOST_WARN=1 modules

      - name: Verify
        run: |
          KO=${{ github.workspace }}/DirettaAlsaHost/alsa_bridge.ko
          ls -la "$KO"
          modinfo "$KO" | grep -E "filename|vermagic|description"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: alsa_bridge-pi4
          path: DirettaAlsaHost/alsa_bridge.ko
