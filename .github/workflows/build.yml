name: Build Pi 4B kernel + alsa_bridge.ko

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu \
            bc flex bison libelf-dev lz4

      - name: Download RPi kernel source
        run: |
          git clone --depth=1 -b rpi-6.6.y \
            https://github.com/raspberrypi/linux.git /tmp/linux

      - name: Configure kernel (Pi 4B 64-bit)
        working-directory: /tmp/linux
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- bcm2711_defconfig
          KVER=$(grep UTS_RELEASE include/generated/utsrelease.h | awk -F'"' '{print $2}')
          echo "KERNEL_VERSION=$KVER" >> $GITHUB_ENV

      - name: Build kernel Image + modules
        working-directory: /tmp/linux
        run: |
          make -j$(nproc) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- Image modules
          echo "Kernel build done"

      - name: Build alsa_bridge.ko
        run: |
          make -C /tmp/linux \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            M=${{ github.workspace }}/DirettaAlsaHost \
            KBUILD_MODPOST_WARN=1 modules

      - name: Package artifacts
        run: |
          mkdir -p output
          cp /tmp/linux/arch/arm64/boot/Image output/kernel8.img
          cp ${{ github.workspace }}/DirettaAlsaHost/alsa_bridge.ko output/
          cp /tmp/linux/.config output/config-${{ env.KERNEL_VERSION }}
          echo "=== Package contents ==="
          ls -lh output/
          echo "Kernel: ${{ env.KERNEL_VERSION }}"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pi4-kernel-bundle
          path: output/
