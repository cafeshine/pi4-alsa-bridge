name: Build alsa_bridge.ko + kernel Image (single source) — 32-bit ARM

on:
  workflow_dispatch:

env:
  CROSS_COMPILE: arm-linux-gnueabihf-

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-arm-linux-gnueabihf bc flex bison libelf-dev kmod

      - name: Download RPi kernel source
        run: |
          git clone --depth=1 -b rpi-6.6.y \
            https://github.com/raspberrypi/linux.git /tmp/linux

      - name: Build kernel (all modules + zImage)
        working-directory: /tmp/linux
        run: |
          make ARCH=arm CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            bcm2711_defconfig
          # Keep core ALSA USB audio built-in (=y) so kernel7l.img
          # itself has USB DAC support without needing extra modules
          for opt in SND_USB_AUDIO SND_PCM SND_TIMER SND_HWDEP \
                     SND_USB_MIDI_LIB SND_USB SND_SOC; do
            scripts/config --set-val "$opt" y
          done; make olddefconfig
          make ARCH=arm CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            modules_prepare
          KVER=$(grep UTS_RELEASE include/generated/utsrelease.h | awk -F'"' '{print $2}')
          echo "KERNEL_VERSION=$KVER" >> $GITHUB_ENV
          make -j$(nproc) ARCH=arm CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            zImage modules

      - name: Build alsa_bridge.ko
        run: |
          make -C /tmp/linux \
            ARCH=arm CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            M=${{ github.workspace }}/DirettaAlsaHost \
            KBUILD_MODPOST_WARN=1 modules

      - name: Install modules + Package
        run: |
          mkdir -p output/
          KVER=${{ env.KERNEL_VERSION }}
          # kernel zImage → kernel7l.img (Pi 4B 32-bit)
          cp /tmp/linux/arch/arm/boot/zImage output/kernel7l.img
          # Install ALL kernel modules (snd, snd-pcm, etc.)
          make -C /tmp/linux \
            ARCH=arm CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            modules_install INSTALL_MOD_PATH=${{ github.workspace }}/output
          # alsa_bridge.ko into modules tree for depmod
          mkdir -p output/lib/modules/$KVER/kernel/drivers/alsa_bridge
          cp ${{ github.workspace }}/DirettaAlsaHost/alsa_bridge.ko \
             output/lib/modules/$KVER/kernel/drivers/alsa_bridge/
          # also standalone copy
          cp ${{ github.workspace }}/DirettaAlsaHost/alsa_bridge.ko output/
          # regenerate dep
          depmod -b output -F /tmp/linux/System.map $KVER
          echo "Source version: $KVER" > output/version.txt
          ls -lhR output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pi4-bundle
          path: output/
