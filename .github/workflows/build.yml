name: Build alsa_bridge.ko + bundle pre-built kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu bc flex bison libelf-dev

      - name: Download RPi kernel source
        run: |
          git clone --depth=1 -b rpi-6.6.y \
            https://github.com/raspberrypi/linux.git /tmp/linux

      - name: Prepare kernel headers
        working-directory: /tmp/linux
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- bcm2711_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare
          KVER=$(grep UTS_RELEASE include/generated/utsrelease.h | awk -F'"' '{print $2}')
          echo "KERNEL_VERSION=$KVER" >> $GITHUB_ENV

      - name: Build alsa_bridge.ko
        run: |
          make -C /tmp/linux \
            ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            M=${{ github.workspace }}/DirettaAlsaHost \
            KBUILD_MODPOST_WARN=1 modules

      - name: Download pre-built kernel
        run: |
          for url in \
            "http://archive.raspberrypi.com/debian/pool/main/l/linux/linux-image-6.6.20+rpt-rpi-v8_6.6.20-1+rpt1_arm64.deb" \
            "http://archive.raspberrypi.com/debian/pool/main/l/linux/linux-image-6.6.28+rpt-rpi-v8_1:6.6.28-1+rpt1_arm64.deb" \
            "http://archive.raspberrypi.com/debian/pool/main/l/linux/linux-image-6.6.47+rpt-rpi-v8_1:6.6.47-1+rpt1_arm64.deb"; do
            wget -nv "$url" -O /tmp/kernel.deb 2>&1 && break
          done
          ls -lh /tmp/kernel.deb

      - name: Extract kernel Image
        run: |
          cd /tmp
          ar x kernel.deb
          ls -la data.tar.* 2>&1
          tar xf data.tar.xz boot/vmlinuz-*
          mkdir -p ${{ github.workspace }}/output
          cp boot/vmlinuz-* ${{ github.workspace }}/output/kernel8.img
          ls -lh ${{ github.workspace }}/output/kernel8.img
          echo "Kernel extracted OK"

      - name: Package
        run: |
          mkdir -p output
          cp DirettaAlsaHost/alsa_bridge.ko output/
          echo "Source version: ${{ env.KERNEL_VERSION }}" > output/version.txt
          ls -lh output/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: pi4-bundle
          path: output/
