name: Build armv7hl kernel for Pi 4B (SOtM Fedora 36 compatible)

on:
  workflow_dispatch:
    inputs:
      kver:
        description: 'Kernel version (e.g. 6.2.15)'
        required: false
        default: '6.2.15'
      localversion:
        description: 'LOCALVERSION for vermagic match'
        required: false
        default: '-215.fc36.armv7hl'

env:
  KVER: ${{ github.event.inputs.kver || '6.2.15' }}
  LOCALVER: ${{ github.event.inputs.localversion || '-215.fc36.armv7hl' }}
  CROSS_COMPILE: arm-linux-gnueabihf-

jobs:
  build-kernel:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-arm-linux-gnueabihf \
            bc flex bison libelf-dev kmod \
            cpio rsync

      - name: Download RPi kernel source (rpi-6.2.y)
        run: |
          git clone --depth=1 -b rpi-6.2.y \
            https://github.com/raspberrypi/linux.git /tmp/linux
          echo "Source ready at /tmp/linux ($(du -sh /tmp/linux | cut -f1))"
          # Show the exact version
          cd /tmp/linux && git log --oneline -1

      - name: Apply RPi bcm2711_defconfig base
        working-directory: /tmp/linux
        run: |
          make ARCH=arm CROSS_COMPILE=${{ env.CROSS_COMPILE }} bcm2711_defconfig
          echo "=== Base config key settings ==="
          grep -E '(CONFIG_PREEMPT|CONFIG_SMP|CONFIG_ARM_LPAE|CONFIG_LOCALVERSION|CONFIG_MMC_BCM)' .config | grep -v '^#'

      - name: Overlay SOtM vermagic-compatible settings
        working-directory: /tmp/linux
        run: |
          bash "${{ github.workspace }}/scripts/armv7hl-bcm2711-config.sh"

      - name: Build kernel (zImage, modules, dtbs)
        working-directory: /tmp/linux
        run: |
          make ARCH=arm CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            -j$(nproc) zImage modules dtbs
          echo "=== zImage ==="
          file arch/arm/boot/zImage
          echo "=== DTB ==="
          ls -la arch/arm/boot/dts/bcm2711*.dtb
          # Get the full kernel version
          KREL=$(make ARCH=arm kernelrelease)
          echo "KERNEL_RELEASE=$KREL" >> $GITHUB_ENV
          echo "Built: $KREL"

      - name: Build System.map
        working-directory: /tmp/linux
        run: |
          make ARCH=arm CROSS_COMPILE=${{ env.CROSS_COMPILE }} System.map
          ls -la System.map

      - name: Install modules
        run: |
          mkdir -p output/
          make -C /tmp/linux ARCH=arm CROSS_COMPILE=${{ env.CROSS_COMPILE }} \
            modules_install INSTALL_MOD_PATH=${{ github.workspace }}/output

      - name: Strip modules tree (remove source/build symlinks)
        run: |
          KREL="${{ env.KERNEL_RELEASE }}"
          MODDIR="${{ github.workspace }}/output/lib/modules/$KREL"
          echo "Modules dir before: $(du -sh $MODDIR | cut -f1)"
          # Remove kernel source symlinks (these are the huge ones)
          rm -f "$MODDIR/build" "$MODDIR/source" 2>/dev/null || true
          echo "Modules dir after: $(du -sh $MODDIR | cut -f1)"
          echo "Ko files: $(find $MODDIR -name '*.ko' | wc -l)"

      - name: Verify vermagic matches original
        run: |
          KREL="${{ env.KERNEL_RELEASE }}"
          echo "Kernel release: $KREL"
          ANY_KO=$(find "${{ github.workspace }}/output/lib/modules/$KREL" -name '*.ko' 2>/dev/null | head -1)
          if [ -n "$ANY_KO" ]; then
            echo "=== Built module vermagic ==="
            modinfo "$ANY_KO" | grep vermagic
          fi
          echo "=== Expected vermagic ==="
          echo "6.2.15-215.fc36.armv7hl SMP preempt mod_unload ARMv7 p2v8"

      - name: Package kernel release tarball
        run: |
          KREL="${{ env.KERNEL_RELEASE }}"
          PKG_DIR="output/boot"
          mkdir -p "$PKG_DIR"
          # Copy kernel image
          cp /tmp/linux/arch/arm/boot/zImage "$PKG_DIR/vmlinuz-$KREL"
          # Copy DTB
          cp /tmp/linux/arch/arm/boot/dts/bcm2711-rpi-4-b.dtb "$PKG_DIR/"
          # Copy System.map
          cp /tmp/linux/System.map "$PKG_DIR/System.map-$KREL"
          # Copy config
          cp /tmp/linux/.config "$PKG_DIR/config-$KREL"
          # Version info
          echo "kernel=$KREL" > output/version.txt
          echo "arch=armv7hl" >> output/version.txt
          echo "target=Pi-4B-BCM2711" >> output/version.txt
          # Create tarball (excludes kernel source, ~7MB + 40MB modules)
          cd output && tar czf "/tmp/pi4-armv7hl-kernel-$KREL.tar.gz" \
            boot/ lib/ version.txt
          echo "=== Release tarball ==="
          ls -lh "/tmp/pi4-armv7hl-kernel-$KREL.tar.gz"

      - name: Create GitHub Release
        run: |
          KREL="${{ env.KERNEL_RELEASE }}"
          TAG="armv7hl-kernel-$KREL"
          NOTES="## Pi 4B armv7hl kernel (SOtM Fedora 36 compatible)
          - Kernel: $KREL
          - Target: Raspberry Pi 4B (BCM2711)
          - Config base: SOtM Cubietruck Fedora 36 armv7hl
          - Vermagic: matches original SOtM alsa_bridge.ko
          
          ### Boot files (in boot/)
          - \`vmlinuz-$KREL\` — zImage kernel
          - \`bcm2711-rpi-4-b.dtb\` — Pi 4B device tree
          - \`System.map-$KREL\` — kernel symbols
          - \`config-$KREL\` — kernel config
          
          ### Modules (in lib/modules/$KREL/kernel/)
          - BCM2835/BCM2711 drivers built-in (MMC, GPIO, USB, ethernet)
          - All Fedora 36 SOtM modules preserved
          
          ### SD card setup
          1. First partition FAT32 with Pi firmware + these boot files + config.txt
          2. Second partition: SOtM Fedora 36 rootfs
          3. Copy lib/modules/$KREL to rootfs
          4. Run depmod"
          
          gh release create "$TAG" \
            "/tmp/pi4-armv7hl-kernel-$KREL.tar.gz" \
            --repo ${{ github.repository }} \
            --title "Pi 4B armv7hl kernel $KREL" \
            --notes "$NOTES"
